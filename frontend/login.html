<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Luffatri AI — Sign in</title>
  <script src="js/theme.js"></script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
</head>
<body class="login-page">

  <!-- Error banner (positioned via CSS) -->
  <div class="banner error" id="errorBanner" style="display:none; position:fixed; top:18px; left:50%; transform:translateX(-50%); z-index:9999; max-width:420px; min-width:220px;"></div>

  <div class="container" id="container">

    <!-- Sign Up panel -->
    <div class="form-container sign-up">
      <form id="registerForm" novalidate>
        <h1>Create account</h1>
        <div class="social-icons">
          <a href="#" aria-label="Sign up with Google" title="Sign up with Google">
            <i class="fa-brands fa-google" aria-hidden="true"></i>
          </a>
        </div>
        <span>or use your email to register</span>

        <input type="text"     id="registerName"     placeholder="Your name"      required autocomplete="name" />
        <input type="email"    id="registerEmail"    placeholder="you@example.com" required autocomplete="email" />
        <input type="password" id="registerPassword" placeholder="Password (8+ chars)" required autocomplete="new-password" minlength="8" />

        <button type="submit" id="registerSubmitBtn">Sign Up</button>
      </form>
    </div>

    <!-- Sign In panel -->
    <div class="form-container sign-in">
      <form id="loginForm" novalidate>
        <h1>Sign in</h1>
        <div class="social-icons">
          <a href="#" aria-label="Sign in with Google" title="Sign in with Google">
            <i class="fa-brands fa-google" aria-hidden="true"></i>
          </a>
        </div>
        <span>or use your email and password</span>

        <input type="email"    id="loginEmail"    placeholder="you@example.com" required autocomplete="email" />
        <input type="password" id="loginPassword" placeholder="••••••••"        required autocomplete="current-password" />
        <a href="#">Forgot your password?</a>

        <button type="submit" id="loginSubmitBtn">Sign In</button>
      </form>
    </div>

    <!-- Sliding overlay -->
    <div class="toggle-container" aria-hidden="true">
      <div class="toggle">
        <div class="toggle-panel toggle-left">
          <h1>Welcome back!</h1>
          <p>Sign in to keep chatting with your characters.</p>
          <button class="hidden" id="login">Sign In</button>
        </div>
        <div class="toggle-panel toggle-right">
          <h1>New here?</h1>
          <p>Create an account and start building characters.</p>
          <button class="hidden" id="register">Sign Up</button>
        </div>
      </div>
    </div>

  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
